<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>TCDD Bilet Takip</title>
<link rel="manifest" href="/static/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e63329;
    --red-dim: #8a1e1a;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07);
    --text: #f0ede8;
    --muted: #6b6b6b;
    --green: #22c55e;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  header {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .header-text p {
    font-size: 12px;
    color: var(--muted);
  }

  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 10px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }

  .status-dot.active { background: var(--green); animation: blink 1.2s infinite; }
  .status-dot.error { background: var(--red); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  main { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .card-header {
    padding: 0.875rem 1rem 0;
    font-size: 11px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .card-body { padding: 0.75rem 1rem 1rem; display: flex; flex-direction: column; gap: 0.75rem; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 0.65rem 0.875rem;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus { border-color: rgba(230,51,41,0.5); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .backend-row { display: flex; gap: 0.5rem; }
  .backend-row input { flex: 1; }
  .test-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 12px;
    padding: 0 0.875rem;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--mono);
    transition: color 0.15s, border-color 0.15s;
  }
  .test-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .test-btn.ok { color: var(--green); border-color: rgba(34,197,94,0.4); }
  .test-btn.fail { color: var(--red); border-color: rgba(230,51,41,0.4); }

  .big-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 14px;
    border: none;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    position: relative;
    overflow: hidden;
  }
  .big-btn:active { transform: scale(0.98); }
  .big-btn.start { background: var(--red); color: #fff; }
  .big-btn.stop { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .big-btn:disabled { opacity: 0.4; pointer-events: none; }

  .log-card { flex: 1; }
  .log-header {
    padding: 0.875rem 1rem 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .log-label { font-size: 11px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .clear-btn { font-size: 11px; font-family: var(--mono); color: var(--muted); background: none; border: none; cursor: pointer; }

  .log-body {
    padding: 0.75rem 1rem 1rem;
    display: flex; flex-direction: column; gap: 6px;
    max-height: 280px;
    overflow-y: auto;
  }

  .log-entry {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 12px;
    font-family: var(--mono);
    line-height: 1.5;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }

  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-msg { color: var(--text); }
  .log-entry.found .log-msg { color: var(--green); }
  .log-entry.error .log-msg { color: var(--red); }
  .log-entry.info .log-msg { color: #60a5fa; }

  .found-banner {
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 14px;
    padding: 1rem;
    display: none;
    flex-direction: column;
    gap: 0.5rem;
  }
  .found-banner.show { display: flex; }
  .found-banner-title { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.05em; }
  .found-banner-detail { font-size: 14px; color: var(--text); line-height: 1.5; }
  .go-btn {
    margin-top: 0.25rem;
    padding: 0.65rem 1rem;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .interval-row { display: flex; align-items: center; gap: 0.75rem; }
  .interval-row label { font-size: 12px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; }
  .interval-row select { flex: 1; }

  .check-count {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .check-count span { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 4px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🚄</div>
    <div class="header-text">
      <h1>BiletTakip</h1>
      <p>TCDD müsaitlik izleyici</p>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusLabel">beklemede</span>
    </div>
  </header>

  <main>
    <!-- Found banner -->
    <div class="found-banner" id="foundBanner">
      <div class="found-banner-title">Bilet Bulundu!</div>
      <div class="found-banner-detail" id="foundDetail"></div>
      <button class="go-btn" onclick="openWindow('https://bilet.tcdd.gov.tr')">TCDD'ye Git →</button>
    </div>

    <!-- Backend -->
    <div class="card">
      <div class="card-header">Backend URL</div>
      <div class="card-body">
        <div class="field">
          <label>Render'daki servis URL'in</label>
          <div class="backend-row">
            <input type="url" id="backendUrl" placeholder="https://tcdd-bilet-takip.onrender.com" autocapitalize="none"/>
            <button class="test-btn" id="testBtn" onclick="testBackend()">Test</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Sefer bilgisi -->
    <div class="card">
      <div class="card-header">Sefer</div>
      <div class="card-body">
        <div class="row">
          <div class="field">
            <label>Kalkış</label>
            <input type="text" id="kalkis" placeholder="İstanbul (Söğütlüçeşme)" autocapitalize="none"/>
          </div>
          <div class="field">
            <label>Varış</label>
            <input type="text" id="varis" placeholder="Ankara" autocapitalize="none"/>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Tarih</label>
            <input type="date" id="tarih"/>
          </div>
          <div class="field">
            <label>Saat (opsiyonel)</label>
            <input type="time" id="saat" placeholder="09:00"/>
          </div>
        </div>
        <div class="interval-row">
          <label>Sıklık</label>
          <select id="interval">
            <option value="30000">30 saniye</option>
            <option value="60000" selected>1 dakika</option>
            <option value="120000">2 dakika</option>
            <option value="300000">5 dakika</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <button class="big-btn start" id="startBtn" onclick="startTracking()">Takibe Başla</button>
    <button class="big-btn stop" id="stopBtn" onclick="stopTracking()" style="display:none">Durdur</button>

    <!-- Log -->
    <div class="card log-card">
      <div class="log-header">
        <div class="log-label">Kayıtlar <span id="checkCountBadge" style="color:var(--text);margin-left:6px;">—</span></div>
        <button class="clear-btn" onclick="clearLog()">temizle</button>
      </div>
      <div class="log-body" id="logBody">
        <div class="log-entry info">
          <span class="log-time">—</span>
          <span class="log-msg">Uygulama hazır. Backend URL'ini gir ve takibe başla.</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  let sw = null;
  let checkCount = 0;
  let active = false;

  // Yarın tarihi varsayılan
  const dateEl = document.getElementById('tarih');
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  dateEl.value = tomorrow.toISOString().split('T')[0];

  // LocalStorage'dan backend URL yükle
  const savedUrl = localStorage.getItem('backendUrl');
  if (savedUrl) document.getElementById('backendUrl').value = savedUrl;

  // Service worker kaydet
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').then(reg => {
      sw = reg;
      log('info', 'Servis worker yüklendi.');
    }).catch(e => log('error', 'SW hatası: ' + e.message));

    navigator.serviceWorker.addEventListener('message', e => {
      const { type, data, error } = e.data;
      if (type === 'CHECK_RESULT') handleResult(data);
      if (type === 'CHECK_ERROR') log('error', 'Kontrol hatası: ' + error);
    });
  }

  async function testBackend() {
    const url = document.getElementById('backendUrl').value.trim();
    if (!url) return;
    const btn = document.getElementById('testBtn');
    btn.textContent = '...';
    try {
      const r = await fetch(url + '/health');
      const d = await r.json();
      if (d.status === 'ok') {
        btn.textContent = '✓ OK';
        btn.className = 'test-btn ok';
        localStorage.setItem('backendUrl', url);
        log('info', 'Backend bağlantısı başarılı: ' + url);
      } else throw new Error('Beklenmeyen yanıt');
    } catch(e) {
      btn.textContent = '✗ Hata';
      btn.className = 'test-btn fail';
      log('error', 'Backend\'e ulaşılamadı: ' + e.message);
    }
    setTimeout(() => { btn.textContent = 'Test'; btn.className = 'test-btn'; }, 3000);
  }

  async function startTracking() {
    const backendUrl = document.getElementById('backendUrl').value.trim();
    const kalkis = document.getElementById('kalkis').value.trim();
    const varis = document.getElementById('varis').value.trim();
    const tarih = document.getElementById('tarih').value;
    const saat = document.getElementById('saat').value;
    const interval = parseInt(document.getElementById('interval').value);

    if (!backendUrl) { alert('Backend URL\'ini gir.'); return; }
    if (!kalkis || !varis || !tarih) { alert('Kalkış, varış ve tarih zorunlu.'); return; }

    // Bildirim izni al
    if ('Notification' in window && Notification.permission !== 'granted') {
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') {
        log('error', 'Bildirim izni verilmedi. Ayarlardan izin ver.');
        return;
      }
    }

    localStorage.setItem('backendUrl', backendUrl);
    active = true;
    checkCount = 0;
    setStatus('active', 'izleniyor');

    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    document.getElementById('foundBanner').classList.remove('show');

    const config = { backendUrl, kalkis, varis, tarih, saat: saat || null, interval };
    log('info', `Takip başladı: ${kalkis} → ${varis} | ${tarih}${saat ? ' | ' + saat : ''}`);

    if (sw && sw.active) {
      sw.active.postMessage({ type: 'START_CHECK', config });
    } else {
      // Fallback: main thread polling
      doCheck(config);
      window._pollTimer = setInterval(() => doCheck(config), interval);
    }
  }

  function stopTracking() {
    active = false;
    clearInterval(window._pollTimer);
    if (sw && sw.active) sw.active.postMessage({ type: 'STOP_CHECK' });
    setStatus('idle', 'beklemede');
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    log('info', 'Takip durduruldu.');
  }

  async function doCheck(config) {
    try {
      const r = await fetch(config.backendUrl + '/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ kalkis: config.kalkis, varis: config.varis, tarih: config.tarih, saat: config.saat })
      });
      const data = await r.json();
      handleResult(data);
    } catch(e) {
      log('error', 'Bağlantı hatası: ' + e.message);
    }
  }

  function handleResult(data) {
    checkCount++;
    document.getElementById('checkCountBadge').textContent = `#${checkCount}`;

    if (data.error) { log('error', data.error); return; }

    if (data.bilet_var) {
      const found = data.seferler.filter(s => s.bos);
      found.forEach(s => {
        log('found', `BİLET ÇIKTI! ${s.saat} seferi — ${s.musait_koltuk} koltuk müsait`);
      });
      const detail = found.map(s => `${s.saat} seferi: ${s.musait_koltuk} koltuk`).join(' · ');
      document.getElementById('foundDetail').textContent = `${data.kalkis} → ${data.varis} | ${data.tarih}\n${detail}`;
      document.getElementById('foundBanner').classList.add('show');
      // Ses çal
      try {
        const ctx = new AudioContext();
        [440, 550, 660].forEach((f, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = f;
          gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.3);
        });
      } catch(e) {}
    } else {
      const seferler = data.seferler;
      if (seferler.length === 0) {
        log('error', `Sefer bulunamadı. Saat/istasyon adını kontrol et.`);
      } else {
        log('info', `Kontrol #${checkCount}: dolu (${seferler.map(s=>s.saat).join(', ')})`);
      }
    }
  }

  function setStatus(state, label) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (state === 'active' ? ' active' : state === 'error' ? ' error' : '');
    document.getElementById('statusLabel').textContent = label;
  }

  function log(type, msg) {
    const body = document.getElementById('logBody');
    const now = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const el = document.createElement('div');
    el.className = `log-entry ${type}`;
    el.innerHTML = `<span class="log-time">${now}</span><span class="log-msg">${msg}</span>`;
    body.prepend(el);
    while (body.children.length > 50) body.removeChild(body.lastChild);
  }

  function clearLog() {
    document.getElementById('logBody').innerHTML = '';
  }

  function openWindow(url) {
    window.open(url, '_blank');
  }
</script>
</body>
</html>
